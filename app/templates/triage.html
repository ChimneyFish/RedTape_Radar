{% extends "base.html" %}
{% block content %}
<h1>Triage Inbox</h1>
<p>Pending drafts will appear here.</p>
{% for draft in drafts %}
<div class="card">
    <h3>[{{ draft.target.resource }}] {{ draft.topic }}</h3>
    <p><strong>Summary:</strong> {{ draft.summary_raw }}</p>
    <form action="/api/drafts/{{ draft.id }}/approve" method="post">
        <label>Actionable Steps:</label><br>
        <textarea name="actionable_steps" required style="width: 100%;"></textarea><br><br>
        <button type="submit">Approve & Publish</button>
    </form>
</div>
{% else %}
<p>No new drafts pending review.</p>
{% endfor %}
{% endblock %}
