{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 400px; margin: 50px auto; border-top: 5px solid #dc3545;">
    <h2>Security Notice</h2>
    <p>An administrator has required you to change your password before continuing to RedTape Radar.</p>
    {% if error %}<p style="color: red;"><strong>{{ error }}</strong></p>{% endif %}
    
    <form action="/api/reset-password" method="post">
        <input type="hidden" name="email" value="{{ email }}">
        
        <label>Verify Current Password:</label><br>
        <input type="password" name="old_password" required style="width: 100%; margin-bottom: 15px;"><br>
        
        <label>New Secure Password:</label><br>
        <input type="password" name="new_password" required style="width: 100%; margin-bottom: 20px;"><br>
        
        <button type="submit" style="background-color: #dc3545; width: 100%;">Update Password & Login</button>
    </form>
</div>
{% endblock %}
