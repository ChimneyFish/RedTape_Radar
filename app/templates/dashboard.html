{% extends "base.html" %}
{% block content %}
<h1>Dashboard</h1>
<p>Welcome, {{ user.name }}</p>
<table border="1" width="100%" style="background: white; border-collapse: collapse;">
    <tr><th>Resource</th><th>Topic</th><th>Summary</th><th>Actionable Steps</th></tr>
    {% for alert in alerts %}
    <tr>
        <td>{{ alert.resource }}</td>
        <td>{{ alert.topic }}</td>
        <td>{{ alert.summary }}</td>
        <td>{{ alert.actionable_steps }}</td>
    </tr>
    {% else %}
    <tr><td colspan="4">No alerts published yet.</td></tr>
    {% endfor %}
</table>
{% endblock %}
